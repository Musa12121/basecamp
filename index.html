<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="upperpart"><img src="./converted.svg" alt="">
        <h1 class="maintitle">COLLABORATE</h1>
        <p>A project managment tool for developers</p></div>
        <div class="buttons"><button id="register">Sign up</button>
        <button id="login">Login</button></div>
    </div>
    <div class="register disappear">
        <img src="./converted.svg" alt="">
        <h1>Sign up</h1>
        <div class="formblock"><label for="name">Name</label><input type="text" id="name"></div>
        <div class="formblock"><label for="email">Email</label><input type="email" id="email"></div>
        <div class="formblock"><label for="password">Password</label><input type="password" id="password" class="withtext"><span style="color: gray;">Must be at least 6 characthers long</span></div>
        <div class="formblock"><label for="passwordrepeat">Password confirmation</label><input type="password" id="passwordrepeat"></div>
        <div class="registerlowerpart"><button id="submitbtn">Sign Up</button>
        <p>Already a member? <a href="#" id="loginlink">Log in</a></p></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
