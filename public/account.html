<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="account.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <nav>
        <div><img src="./converted.svg" alt=""></div>
        <div class="rightsideofnav">
            <a href="#" class="newprojectbtn"><i class="fa-solid fa-plus" style="color: rgb(106, 197, 204);"></i><span
                    class="textnexttoicon">Add Project</span></a>
            <a href="#"><i class="fa-solid fa-gear" style="color: rgb(106, 197, 204);"></i><span
                    class="textnexttoicon">Edit profile</span></a>
            <a href="#"><i class="fa-solid fa-door-open" style="color: rgb(106, 197, 204);"></i><span
                    class="textnexttoicon">Log Out</span></a>
        </div>
    </nav>
    <main>
        <div class="default disappear"> <!--didnt have disappear-->
            <h1>Projects</h1>
            <div class="links">
                <div class="link"><a href="#">All projects</a></div>
                <div class="link"><a href="#">Created by me</a></div>
                <div class="link"><a href="#">Shared with me</a></div>
            </div>
            <ul class="projectList">
            </ul>
        </div>
        <div class="settingsPage "> <!--had disappear-->
            <main class="settingMain">
                <div class="wrapperInsideMain">
                    <div><h1>Edit Project</h1>
                    <i class="fa-solid fa-pen"></i><span>Created by: toto@gmail.com</span></div>
                    <div class="wrapperOfInputBlock">
                        <div class="inputBlockSettings">
                            <label for="nameInputs">Name</label><input type="text">
                        </div><div class="buttonDiv"><button>Update Name</button></div>
                    </div>
                    <div class="wrapperOfInputBlock">
                        <div class="inputBlockSettings">
                             <label for="nameInputs">Description</label><textarea rows="3"></textarea>
                        </div><div class="buttonDiv"><button>Update Description</button></div>
                    </div>
                    <div class="wrapperOfInputBlock">
                        <div class="inputBlockSettings">
                             <label for="nameInputs">Add Member (email)</label><input type="text">
                        </div><div class="specialCheck"><input type="checkbox" id="check"><label for="check">Admin</label></div><i class="fa-solid fa-user-plus" style=""></i>
                    </div>
            </main>
            <aside>
                <div class="asideContainer">
                    <button id="overview"><i class="fa-regular fa-eye"></i>Project Overview</button>
                    <button id="deleteproject"><i class="fa-regular fa-trash-can"></i>Delete Project</button>
                </div>
            </aside>
        </div>
        <div class="newprojectpage disappear">
            <h1>New Project</h1>
            <div class="inputblock"><label for="">Name</label><input type="text" id="newProjectName"></div>
            <div class="inputblock"><label for="">Description</label><textarea rows="5"
                    id="newProjectdDescription"></textarea></div>
            <div class="buttondiv"><button id="newProjectButton">Create Project</button></div>
        </div>
</div>
    </main>
    <script src="account.js"></script>
</body>

</html>
